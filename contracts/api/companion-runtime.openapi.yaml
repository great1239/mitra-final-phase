openapi: 3.1.0
info:
  title: Mitra Companion Runtime API
  version: 1.0.0
  description: >
    Versioned interface for sessions, partitioned context, explicit intent
    routing, context transfer, product attachment, and bounded companion
    interaction, deterministic reconstruction, and runtime artifact export.
    The runtime does not own governance, safety, knowledge authority, product
    logic, external evidence/replay authority, certification, or Central
    Depository acceptance.
servers:
  - url: https://mitra-live-runtime-sprint.vercel.app
    description: User-assigned independent Mitra host
  - url: http://localhost:8090
    description: Local development runtime
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Runtime health
  /metrics:
    get:
      operationId: getPrometheusMetrics
      responses:
        "200":
          description: Prometheus-compatible runtime metrics
          content:
            text/plain:
              schema:
                type: string
  /ready:
    get:
      operationId: getReadiness
      responses:
        "200":
          description: Runtime accepts work
        "503":
          description: Runtime is not ready
  /api/v1/runtime/status:
    get:
      operationId: getRuntimeStatus
      responses:
        "200":
          description: Runtime state and counts
  /api/v1/runtime/startup:
    get:
      operationId: getRuntimeStartup
      responses:
        "200":
          description: Last production startup-manager report and completed phases
  /api/v1/runtime/restart:
    post:
      operationId: restartRuntime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Graceful runtime restart report
        "422":
          description: Invalid or incompatible contract
  /api/v1/runtime/recovery:
    post:
      operationId: recoverRuntime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Runtime recovery pass for heartbeat, stale peers, and interrupted tasks
        "422":
          description: Invalid or incompatible contract
  /api/v1/runtime/config:
    get:
      operationId: getRuntimeProductionConfig
      responses:
        "200":
          description: Redacted production configuration summary
  /api/v1/runtime/secrets:
    get:
      operationId: getRuntimeSecretsSummary
      responses:
        "200":
          description: Redacted production secrets summary
  /api/v1/runtime/instances:
    get:
      operationId: listRuntimeInstances
      parameters:
        - in: query
          name: include_stopped
          schema: {type: boolean, default: false}
      responses:
        "200":
          description: Runtime instance heartbeat records
  /api/v1/runtime/instances/reconcile:
    post:
      operationId: reconcileRuntimeInstances
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Runtime recovery pass plus instance reconciliation
        "422":
          description: Invalid or incompatible contract
  /api/v1/runtime/instances/{instance_id}:
    get:
      operationId: getRuntimeInstance
      parameters:
        - in: path
          name: instance_id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: One runtime instance heartbeat record
        "404":
          description: Runtime instance not found
  /api/v1/runtime/lifecycle:
    get:
      operationId: getRuntimeLifecycle
      parameters:
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 1000, default: 100}
      responses:
        "200":
          description: Ordered lifecycle transition journal
  /api/v1/runtime/chain:
    get:
      operationId: getRuntimeChain
      responses:
        "200":
          description: Runtime-readable Mitra and BHIV command-chain model
  /api/v1/runtime/source-scope:
    get:
      operationId: getRuntimeSourceScope
      responses:
        "200":
          description: Previous-submission feature import and external-system boundary catalog
  /api/v1/runtime/capability-catalog:
    get:
      operationId: getRuntimeCapabilityCatalog
      responses:
        "200":
          description: Manifest-backed product, capability, dependency, and contract catalog
  /api/v1/runtime/capability-graph:
    get:
      operationId: getRuntimeCapabilityGraph
      parameters:
        - in: query
          name: product_id
          schema: {type: string}
        - in: query
          name: capability_id
          schema: {type: string}
        - in: query
          name: available_only
          schema: {type: boolean, default: false}
        - in: query
          name: message
          schema: {type: string}
      responses:
        "200":
          description: Dynamic capability graph built from published manifests, schemas, and optional message terms
  /api/v1/runtime/capability-plan:
    post:
      operationId: createRuntimeCapabilityPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/runtime-analysis.schema.json
      responses:
        "200":
          description: Candidate single or multi-capability plan over published interfaces
        "422":
          description: Invalid or incompatible contract
  /api/v1/runtime/depository:
    get:
      operationId: getRuntimeDepository
      parameters:
        - in: query
          name: artifact_type
          schema: {type: string}
        - in: query
          name: subject_type
          schema: {type: string}
        - in: query
          name: subject_id
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 500, default: 100}
      responses:
        "200":
          description: Content-addressed immutable runtime artifacts and hash-chain lineage export
          content:
            application/json:
              schema:
                $ref: ../schemas/runtime-depository-export.schema.json
  /api/v1/runtime/integrations:
    get:
      operationId: getRuntimeIntegrations
      responses:
        "200":
          description: Configured BHIV contracts plus TANTRA package and gateway handover readiness
  /api/v1/runtime/integrations/tantra/deliveries:
    get:
      operationId: getTantraDeliveries
      parameters:
        - in: query
          name: dispatch_id
          schema: {type: string}
        - in: query
          name: status
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 500, default: 100}
      responses:
        "200":
          description: Durable TANTRA delivery states without request bodies or lease tokens
  /api/v1/runtime/integrations/tantra/process:
    post:
      operationId: processTantraDeliveries
      parameters:
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 100, default: 20}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Claimed delivery attempts and their actual gateway responses
        "422":
          description: Invalid or incompatible contract
  /api/v1/runtime/integrations/tantra/health:
    get:
      operationId: getTantraGatewayHealth
      responses:
        "200":
          description: Actual published gateway health response and retained observation identifier
  /api/v1/runtime/integrations/tantra/reconcile:
    post:
      operationId: reconcileTantraTraces
      parameters:
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 100, default: 20}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Actual remote trace responses with continuity and latency checks
        "422":
          description: Invalid or incompatible contract
  /api/v1/runtime/continuity:
    get:
      operationId: getRuntimeContinuity
      responses:
        "200":
          description: Latest persisted reconstruction, lineage, trace, dependency, lease, and delivery checks
  /api/v1/runtime/continuity/check:
    post:
      operationId: checkRuntimeContinuity
      parameters:
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 500, default: 25}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Newly executed continuity checks over immutable runtime data
        "422":
          description: Invalid or incompatible contract
  /api/v1/runtime/dependencies/health:
    get:
      operationId: getRuntimeDependencyHealth
      parameters:
        - in: query
          name: product_id
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 1000, default: 100}
      responses:
        "200":
          description: Historical observed dependency health and latency patterns
  /api/v1/runtime/analysis:
    post:
      operationId: createRuntimeAnalysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/runtime-analysis.schema.json
      responses:
        "200":
          description: Assignment, user expectation, product profile, and capability fit analysis
        "422":
          description: Invalid or incompatible contract
  /api/v1/ecosystem/readiness:
    get:
      operationId: getEcosystemReadiness
      responses:
        "200":
          description: Configuration status for every required owner contract
  /api/v1/ecosystem/contracts:
    get:
      operationId: getEcosystemContracts
      responses:
        "200":
          description: Published owner contracts, ordering, and authority boundaries
  /api/v1/ecosystem/execute:
    post:
      operationId: executeEcosystemRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/ecosystem-execution.schema.json
      responses:
        "201":
          description: Completed strict Raj, conditional KESHAV, and Central Depository execution checkpoints
        "409":
          description: Session, product, or idempotency conflict
        "422":
          description: No uniquely matching attached capability or invalid contract
        "502":
          description: An owner contract failed or rejected the execution
        "503":
          description: One or more required owner contracts are not configured
  /api/v1/ecosystem/executions:
    get:
      operationId: listEcosystemExecutions
      parameters:
        - in: query
          name: status
          schema: {type: string}
        - in: query
          name: session_id
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 500, default: 100}
      responses:
        "200":
          description: Durable ecosystem executions
  /api/v1/ecosystem/executions/{execution_id}:
    get:
      operationId: getEcosystemExecution
      parameters:
        - $ref: "#/components/parameters/ExecutionId"
      responses:
        "200":
          description: Execution, stage checkpoints, attempts, and lineage
        "404":
          description: Ecosystem execution not found
  /api/v1/ecosystem/executions/{execution_id}/recover:
    post:
      operationId: recoverEcosystemExecution
      parameters:
        - $ref: "#/components/parameters/ExecutionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Execution resumed from its first incomplete durable stage
        "404":
          description: Ecosystem execution not found
        "502":
          description: Recovery reached an owner contract that still fails
  /api/v1/ecosystem/executions/{execution_id}/replay:
    get:
      operationId: getEcosystemReplay
      parameters:
        - $ref: "#/components/parameters/ExecutionId"
      responses:
        "200":
          description: Portable immutable replay package and clean-state validation
        "404":
          description: Ecosystem execution not found
  /api/v1/ecosystem/replay/validate:
    post:
      operationId: validateEcosystemReplay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/ecosystem-replay-validation.schema.json
      responses:
        "200":
          description: Offline reconstruction using only the supplied package
        "422":
          description: Invalid or incompatible contract
  /api/v1/companion/messages:
    post:
      operationId: createCompanionMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/companion-message.schema.json
      responses:
        "200":
          description: Companion turn with selection, memory, task status, and optional dispatch receipt
        "409":
          description: Session, attachment, or routing conflict
        "422":
          description: Invalid or incompatible contract
  /api/v1/companion/messages/stream:
    post:
      operationId: streamCompanionMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/companion-message.schema.json
      responses:
        "200":
          description: NDJSON typing, execution-status, and final-message events
          content:
            application/x-ndjson:
              schema:
                type: string
  /api/v1/companion/sessions/{session_id}/memory:
    get:
      operationId: getCompanionMemory
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 500, default: 100}
      responses:
        "200":
          description: Companion memory summary, recent turns, and execution tasks
        "404":
          description: Session not found
  /api/v1/companion/tasks:
    get:
      operationId: listCompanionTasks
      parameters:
        - in: query
          name: session_id
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 500, default: 100}
      responses:
        "200":
          description: Recent companion execution task records
  /api/v1/companion/tasks/{task_id}:
    get:
      operationId: getCompanionTask
      parameters:
        - in: path
          name: task_id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Single companion execution task record for status polling
        "404":
          description: Companion task not found
  /api/v1/runtime/metrics:
    get:
      operationId: getRuntimeMetrics
      responses:
        "200":
          description: Runtime counters, dispatch latency metrics, and attachment health snapshots
  /api/v1/runtime/telemetry:
    get:
      operationId: getRuntimeTelemetry
      parameters:
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 500, default: 100}
      responses:
        "200":
          description: Recent structured runtime telemetry events
  /api/v1/sessions:
    post:
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/session-create.schema.json
      responses:
        "201":
          description: Session and one-time resume token
        "422":
          description: Invalid or incompatible contract
    get:
      operationId: listSessions
      responses:
        "200":
          description: Recent sessions
  /api/v1/sessions/{session_id}:
    get:
      operationId: getSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session and isolated context partitions
        "404":
          description: Session not found
  /api/v1/sessions/{session_id}/resume:
    post:
      operationId: resumeSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - schema_version
                - contract_version
                - runtime_version
                - compatibility_version
                - resume_token
              properties:
                schema_version: {const: 1.0.0}
                contract_version: {const: 1.0.0}
                runtime_version: {const: 1.0.0}
                compatibility_version: {const: mitra-companion-1}
                resume_token: {type: string, minLength: 24}
      responses:
        "200":
          description: Resumed session
        "409":
          description: Invalid token or closed session
  /api/v1/sessions/{session_id}/suspend:
    post:
      operationId: suspendSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Suspended session
        "404":
          description: Session not found
        "409":
          description: Closed session cannot be suspended
  /api/v1/sessions/{session_id}/close:
    post:
      operationId: closeSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedContract"
      responses:
        "200":
          description: Closed session
        "404":
          description: Session not found
  /api/v1/sessions/{session_id}/context:
    get:
      operationId: loadContext
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - in: query
          name: scope
          description: >
            Optional repeatable partition selector. Omit to load all context
            partitions available to the session.
          schema:
            type: array
            uniqueItems: true
            items:
              enum: [session, workspace, handoff, product]
      responses:
        "200":
          description: Selected isolated context partitions and merged view
    patch:
      operationId: updateContext
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/context-update.schema.json
      responses:
        "200":
          description: Updated context partition and revision
        "409":
          description: Optimistic revision conflict
  /api/v1/sessions/{session_id}/transfer:
    post:
      operationId: transferContext
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/context-transfer.schema.json
      responses:
        "201":
          description: New session, transfer receipt, and target context
        "404":
          description: Source session or target product not found
  /api/v1/attachments:
    post:
      operationId: attachProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - schema_version
                - contract_version
                - runtime_version
                - compatibility_version
                - manifest
              properties:
                schema_version: {const: 1.0.0}
                contract_version: {const: 1.0.0}
                runtime_version: {const: 1.0.0}
                compatibility_version: {const: mitra-companion-1}
                manifest:
                  $ref: ../schemas/product-attachment.schema.json
      responses:
        "201":
          description: Attached product
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachment:
                    $ref: ../schemas/attachment-record.schema.json
        "409":
          description: Product ID already has a different active manifest
        "422":
          description: Invalid or incompatible manifest
    get:
      operationId: listAttachments
      parameters:
        - in: query
          name: include_detached
          description: Include detached historical attachment records.
          schema: {type: boolean, default: false}
      responses:
        "200":
          description: Attached products and capability manifests
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachments:
                    type: array
                    items:
                      $ref: ../schemas/attachment-record.schema.json
  /api/v1/products/connect:
    post:
      operationId: connectProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - schema_version
                - contract_version
                - runtime_version
                - compatibility_version
                - manifest
              properties:
                schema_version: {const: 1.0.0}
                contract_version: {const: 1.0.0}
                runtime_version: {const: 1.0.0}
                compatibility_version: {const: mitra-companion-1}
                manifest:
                  $ref: ../schemas/product-attachment.schema.json
      responses:
        "201":
          description: Product connected through the published attachment manifest
        "409":
          description: Product ID already has a different active manifest
        "422":
          description: Invalid or incompatible manifest
  /api/v1/attachments/health:
    post:
      operationId: checkAllAttachmentHealth
      responses:
        "200":
          description: Active health check for all attached products with recovery validation
  /api/v1/attachments/{product_id}:
    get:
      operationId: getAttachment
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product attachment
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachment:
                    $ref: ../schemas/attachment-record.schema.json
        "404":
          description: Product not found
    delete:
      operationId: detachProduct
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product marked detached
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachment:
                    $ref: ../schemas/attachment-record.schema.json
  /api/v1/attachments/{product_id}/health:
    post:
      operationId: checkAttachmentHealth
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Active health check for one attached product with recovery validation
        "404":
          description: Product not found
  /api/v1/product-exchanges:
    post:
      operationId: createProductExchange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/product-exchange.schema.json
      responses:
        "201":
          description: Product-to-product exchange envelope created
        "404":
          description: Source, target, or session not found
        "409":
          description: Invalid exchange relationship
        "422":
          description: Invalid or incompatible contract
    get:
      operationId: listProductExchanges
      parameters:
        - in: query
          name: source_product_id
          schema: {type: string}
        - in: query
          name: target_product_id
          schema: {type: string}
        - in: query
          name: session_id
          schema: {type: string}
        - in: query
          name: status
          schema:
            enum: [PENDING, RECEIVED, CONSUMED, REJECTED]
        - in: query
          name: include_expired
          schema: {type: boolean, default: false}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 1000, default: 100}
      responses:
        "200":
          description: Product exchange envelopes
  /api/v1/products/{product_id}/exchange-inbox:
    get:
      operationId: getProductExchangeInbox
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - in: query
          name: status
          schema:
            enum: [PENDING, RECEIVED, CONSUMED, REJECTED]
        - in: query
          name: include_expired
          schema: {type: boolean, default: false}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 1000, default: 100}
      responses:
        "200":
          description: Target product inbox of exchange envelopes
        "404":
          description: Product not found
  /api/v1/product-exchanges/{exchange_id}:
    get:
      operationId: getProductExchange
      parameters:
        - in: path
          name: exchange_id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Product exchange envelope
        "404":
          description: Product exchange not found
  /api/v1/product-exchanges/{exchange_id}/ack:
    post:
      operationId: acknowledgeProductExchange
      parameters:
        - in: path
          name: exchange_id
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/product-exchange-ack.schema.json
      responses:
        "200":
          description: Product exchange acknowledgement recorded
        "404":
          description: Product exchange or product not found
        "409":
          description: Product is not a target for this exchange
        "422":
          description: Invalid or incompatible contract
  /api/v1/intents:
    get:
      operationId: discoverIntents
      parameters:
        - in: query
          name: product_id
          schema: {type: string}
        - in: query
          name: capability_id
          schema: {type: string}
        - in: query
          name: intent_id
          schema: {type: string}
        - in: query
          name: available_only
          schema: {type: boolean, default: false}
      responses:
        "200":
          description: Deterministically ordered registered intents
  /api/v1/products/{product_id}/intent-registrations:
    get:
      operationId: getIntentRegistrations
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Intent registrations materialized from the manifest
        "404":
          description: Product not found
        "422":
          description: Detached product cannot register intents
  /api/v1/capabilities:
    get:
      operationId: discoverCapabilities
      parameters:
        - in: query
          name: product_id
          schema: {type: string}
        - in: query
          name: available_only
          schema: {type: boolean, default: false}
      responses:
        "200":
          description: Deterministically ordered capability views
  /api/v1/products/{product_id}/capabilities/{capability_id}:
    get:
      operationId: lookupCapability
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - in: path
          name: capability_id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Exact capability view
        "404":
          description: Product or capability not found
  /api/v1/intents/dispatch:
    post:
      operationId: dispatchIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/intent-dispatch.schema.json
      responses:
        "200":
          description: Route and completed dispatch receipt
        "409":
          description: Ambiguous or cross-product route
        "422":
          description: No registered route
        "502":
          description: Product transport failed
  /api/v1/dispatches:
    get:
      operationId: listDispatches
      responses:
        "200":
          description: Recent dispatch receipts
  /api/v1/dispatches/{dispatch_id}:
    get:
      operationId: getDispatch
      parameters:
        - in: path
          name: dispatch_id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Dispatch request and response receipt
        "404":
          description: Dispatch not found
  /api/v1/dispatches/{dispatch_id}/phases:
    get:
      operationId: getDispatchPhases
      parameters:
        - in: path
          name: dispatch_id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Durable dispatch phase checkpoint journal
        "404":
          description: Dispatch not found
  /api/v1/dispatches/{dispatch_id}/proof:
    get:
      operationId: getDispatchProof
      parameters:
        - in: path
          name: dispatch_id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Portable dispatch proof bundle with hashes and lineage
        "404":
          description: Dispatch not found
  /api/v1/dispatches/{dispatch_id}/reconstruction:
    get:
      operationId: getDispatchReconstruction
      parameters:
        - in: path
          name: dispatch_id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Deterministic reconstruction package from immutable dispatch artifacts
        "404":
          description: Dispatch not found
  /api/v1/reconstruction/validate:
    post:
      operationId: validateReconstructionPackage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconstructionValidationRequest"
      responses:
        "200":
          description: Clean-state validation of an exported immutable reconstruction package
        "422":
          description: Invalid or incompatible contract
components:
  schemas:
    VersionedContract:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - contract_version
        - runtime_version
        - compatibility_version
      properties:
        schema_version: {const: 1.0.0}
        contract_version: {const: 1.0.0}
        runtime_version: {const: 1.0.0}
        compatibility_version: {const: mitra-companion-1}
    ReconstructionValidationRequest:
      allOf:
        - $ref: "#/components/schemas/VersionedContract"
        - type: object
          required:
            - package
          properties:
            package:
              type: object
              additionalProperties: true
  parameters:
    SessionId:
      in: path
      name: session_id
      required: true
      schema: {type: string}
    ProductId:
      in: path
      name: product_id
      required: true
      schema: {type: string}
    ExecutionId:
      in: path
      name: execution_id
      required: true
      schema: {type: string}
