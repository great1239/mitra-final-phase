services:
  companion-runtime:
    build: .
    restart: unless-stopped
    init: true
    ports:
      - "8090:8090"
    environment:
      MITRA_COMPANION_DATA_ROOT: /data
      MITRA_COMPANION_DATABASE_PATH: /data/companion-runtime.db
      MITRA_COMPANION_SQLITE_SYNCHRONOUS: NORMAL
      MITRA_COMPANION_MANIFEST_DIRECTORY: /app/contracts/production
      MITRA_COMPANION_ALLOW_EXAMPLE_MANIFESTS: "false"
      MITRA_COMPANION_ALLOW_SIMULATED_MANIFESTS: "false"
      MITRA_COMPANION_ALLOW_LOOPBACK_MANIFESTS: "false"
      MITRA_COMPANION_ALLOW_LOCALHOST_MANIFESTS: "false"
      MITRA_COMPANION_REQUIRE_PRODUCTION_BOOTSTRAP_MANIFESTS: "true"
      MITRA_COMPANION_CORS_ORIGINS: "https://mitra.blackholeinfiverse.com,https://mitra-live-runtime-sprint.vercel.app,http://localhost:3000,http://127.0.0.1:3000"
      MITRA_COMPANION_ENVIRONMENT: production
      MITRA_COMPANION_DEPLOYMENT_PLATFORM: docker-compose
      MITRA_COMPANION_RUNTIME_STORAGE_MODE: persistent
      MITRA_COMPANION_REQUIRE_ECOSYSTEM_READY: "true"
      MITRA_COMPANION_REQUIRE_PUBLIC_OWNER_ENDPOINTS: "false"
      MITRA_COMPANION_REQUIRE_DURABLE_RUNTIME: "true"
      MITRA_COMPANION_RELEASE_REVISION: "${MITRA_COMPANION_RELEASE_REVISION:-unknown}"
      MITRA_COMPANION_OTEL_ENABLED: "true"
      MITRA_COMPANION_UVICORN_WORKERS: "1"
      OTEL_SERVICE_NAME: mitra-companion-runtime
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
      MITRA_ECOSYSTEM_TIMEOUT_SECONDS: "${MITRA_ECOSYSTEM_TIMEOUT_SECONDS:-45}"
      MITRA_RAJ_WORKFLOW_BASE_URL: "${MITRA_RAJ_WORKFLOW_BASE_URL:-}"
      MITRA_RAJ_API_KEY: "${MITRA_RAJ_API_KEY:-}"
      MITRA_BHIV_ASHMIT_BASE_URL: "${MITRA_BHIV_ASHMIT_BASE_URL:-}"
      MITRA_BHIV_ASHMIT_API_KEY: "${MITRA_BHIV_ASHMIT_API_KEY:-}"
      MITRA_BHIV_BUCKET_BASE_URL: "${MITRA_BHIV_BUCKET_BASE_URL:-}"
      MITRA_BHIV_BUCKET_PARENT_HASH: "${MITRA_BHIV_BUCKET_PARENT_HASH:-}"
      MITRA_BHIV_KESHAV_BASE_URL: "${MITRA_BHIV_KESHAV_BASE_URL:-}"
      MITRA_BHIV_KARMA_BASE_URL: "${MITRA_BHIV_KARMA_BASE_URL:-}"
      MITRA_BHIV_KARMA_PREVIOUS_HASH: "${MITRA_BHIV_KARMA_PREVIOUS_HASH:-}"
      MITRA_BHIV_PRANA_BASE_URL: "${MITRA_BHIV_PRANA_BASE_URL:-}"
      MITRA_CENTRAL_DEPOSITORY_BASE_URL: "${MITRA_CENTRAL_DEPOSITORY_BASE_URL:-}"
      MITRA_BHIV_INSIGHTFLOW_INGEST_URL: "${MITRA_BHIV_INSIGHTFLOW_INGEST_URL:-}"
      MITRA_BHIV_INSIGHTFLOW_API_KEY: "${MITRA_BHIV_INSIGHTFLOW_API_KEY:-}"
    volumes:
      - companion-runtime-data:/data
    tmpfs:
      - /tmp
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    depends_on:
      - otel-collector
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/ready')",
        ]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
          pids: 256
        reservations:
          cpus: "0.25"
          memory: 256M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
      - "8889:8889"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 128
        reservations:
          cpus: "0.10"
          memory: 128M

volumes:
  companion-runtime-data:
